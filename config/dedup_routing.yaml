# config/dedup_routing.yaml
#
# 부호별 본체 시트 라우팅 — 중복 판별용 yaml.
# 같은 부호가 여러 시트에 등장할 때 어느 시트 값을 진짜로 칠지 명시한다.
#
# 필드:
#   count_from : 카운트를 가져올 시트 (= 본체 평면도/주심도)
#   spec_from  : 규격을 가져올 시트 (= 일람표가 있는 시트)
#
# 길이 라우팅은 length_routing.yaml 에서 별도 관리.
# 단위중량은 spec → 단면적 × 7,850 kg/m³ 로 baseline-1 unit_weight_calc 가 자동 계산.
#
# ─────────────────────────────────────────────────────────────────────
# 라운드 중량-1a 범위: 도면4만. 도면1·2·3·5 는 다음 라운드 확장.
# ─────────────────────────────────────────────────────────────────────

도면4:
  기둥:
    SC1:
      count_from: "1층 구조평면도"
      spec_from: "1층 구조평면도"
    SC2:
      count_from: "1층 구조평면도"
      spec_from: "1층 구조평면도"

  # 메모:
  # - 도면4 는 dedup 결정이 자명함 — 카운트·일람표 모두 "1층 구조평면도" 시트에 있음.
  # - 지붕층 구조평면도는 정답지상 "분석 대상=보" 라 기둥 카운트 0. dedup yaml 무관.
  # - 보 부재 (SG·SB) 는 이번 라운드 범위 외, 다음 라운드에서 "보:" 섹션으로 추가.
